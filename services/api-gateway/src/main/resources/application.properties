server.port=8080

# Application name
spring.application.name=api-gateway

# ===== ROUTES =====

# Category Service
spring.cloud.gateway.routes[0].id=category-service
spring.cloud.gateway.routes[0].uri=lb://category-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/addcategory,/api/category/**,/api/categorylist,/api/updatecategory

# User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/adduser,/api/user/**,/api/userlist,/api/updateuser,/api/deleteuser/**

# Product Service
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://product-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/addproduct,/api/product/**,/api/productlist/**,/api/productsearch,/api/updateproduct,/api/deleteproduct/**

# Inventory Service
spring.cloud.gateway.routes[3].id=inventory-service
spring.cloud.gateway.routes[3].uri=lb://inventory-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/addinventory,/api/inventory/**,/api/inventorylist,/api/updateinventory

# Order Service
spring.cloud.gateway.routes[4].id=order-service
spring.cloud.gateway.routes[4].uri=lb://order-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/addorder,/api/order/**,/api/orderlist,/api/updateorder,/api/deleteorder/**

# ===== EUREKA =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/