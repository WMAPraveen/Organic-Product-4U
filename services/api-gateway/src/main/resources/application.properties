server.port=8080
spring.application.name=api-gateway

# ===== EUREKA =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT Secret (must match user-service)
jwt.secret=your-very-long-secret-key-must-be-at-least-32-characters

# ===== ROUTES =====

# User open routes ? login and register (no JWT needed)
spring.cloud.gateway.routes[0].id=user-service-open
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/login,/api/register

# User protected routes
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**,/api/userlist,/api/updateuser,/api/deleteuser/**

# Category Service
spring.cloud.gateway.routes[2].id=category-service
spring.cloud.gateway.routes[2].uri=lb://category-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/addcategory,/api/category/**,/api/categorylist,/api/updatecategory

# Product Service
spring.cloud.gateway.routes[3].id=product-service
spring.cloud.gateway.routes[3].uri=lb://product-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/addproduct,/api/product/**,/api/productlist/**,/api/productsearch,/api/updateproduct,/api/deleteproduct/**

# Inventory Service
spring.cloud.gateway.routes[4].id=inventory-service
spring.cloud.gateway.routes[4].uri=lb://inventory-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/addinventory,/api/inventory/**,/api/inventorylist,/api/updateinventory

# Order Service
spring.cloud.gateway.routes[5].id=order-service
spring.cloud.gateway.routes[5].uri=lb://order-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/addorder,/api/order/**,/api/orderlist,/api/updateorder,/api/deleteorder/**
```

