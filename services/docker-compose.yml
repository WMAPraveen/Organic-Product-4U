version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-server:
    image: ${DOCKERHUB_USERNAME}/discovery-server:latest
    container_name: discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    volumes:
      - ./discovery-server/target/discovery-server-0.0.1-SNAPSHOT.jar:/app/app.jar
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8761 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./api-gateway/target/api-gateway-0.0.1-SNAPSHOT.jar:/app/app.jar
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-net

  user-service:
    image: ${DOCKERHUB_USERNAME}/user-service:latest
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - ./user-service/target/user-service-0.0.1-SNAPSHOT.jar:/app/app.jar
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/user_service
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=86400000
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-net

  category-service:
    image: ${DOCKERHUB_USERNAME}/category-service:latest
    container_name: category-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ./category-service/target/category-service-0.0.1-SNAPSHOT.jar:/app/app.jar
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/category_service
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-net

  product-service:
    image: ${DOCKERHUB_USERNAME}/product-service:latest
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./product-service/target/product-service-0.0.1-SNAPSHOT.jar:/app/app.jar
      - product-images:/app/product-images
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/product_service
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - APP_IMAGE_BASE_URL=http://localhost:8080/api/product-images/
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-net

  inventory-service:
    image: ${DOCKERHUB_USERNAME}/inventory-service:latest
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - ./inventory-service/target/inventory-service-0.0.1-SNAPSHOT.jar:/app/app.jar
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/inventory_service
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-net

  order-service:
    image:  ${DOCKERHUB_USERNAME}/order-service:latest
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    volumes:
      - ./order-service/target/order-service-0.0.1-SNAPSHOT.jar:/app/app.jar
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/order_service
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-net

volumes:
  mysql-data:
  product-images:

networks:
  microservices-net:
    driver: bridge